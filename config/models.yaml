# Model registry for AdvaitaBench — SOTA frontier set as of July 2026.
#
# Routing (harness/providers.py) is also a billing decision: OpenAI, Anthropic,
# and Google specs hit their native APIs (first-party credits); everything else
# routes through OpenRouter (real out-of-pocket spend, reported per run).
# Prefix `provider:` forces a route. `--models @frontier,@openrouter` expands
# groups; `@all` expands everything.
#
# Prices below are per 1M tokens (input/output), from OpenRouter's live catalogue
# on 2026-07-08, for cost intuition only. IDs drift — a model that errors is
# skipped and logged in the run manifest.

groups:
  # ---- Direct-billed frontier (Anthropic + OpenAI + Google credits) ----
  frontier:
    - anthropic:claude-fable-5              # Anthropic SOTA, Mythos-class   $10 / $50
    - anthropic:claude-opus-4-8             # Anthropic flagship             $5  / $25
    - anthropic:claude-sonnet-5             # Anthropic value tier           $2  / $10
    - openai:gpt-5.5                        # OpenAI SOTA                    $5  / $30
    - openai:gpt-5.2                        # OpenAI value tier              $1.75 / $14
    - google:gemini-3.1-pro-preview         # Google SOTA (VERIFY native id) $2  / $12

  # ---- OpenRouter (real spend): xAI, DeepSeek, and the frontier non-Western labs ----
  openrouter:
    - x-ai/grok-4.3                         # xAI flagship                   $1.25 / $2.50
    - deepseek/deepseek-v4-pro              # DeepSeek flagship              $0.43 / $0.87
    - qwen/qwen3.7-max                      # Alibaba Qwen flagship          $1.25 / $3.75
    - z-ai/glm-5.2                          # Zhipu GLM flagship             $0.93 / $3.00
    - moonshotai/kimi-k2.6                  # Moonshot Kimi flagship         $0.66 / $3.41
    - minimax/minimax-m3                    # MiniMax flagship               $0.30 / $1.20
    - mistralai/mistral-medium-3-5          # Mistral flagship               $1.50 / $7.50
    - tencent/hy3                           # Tencent Hunyuan 3              $0.20 / $0.80

  # ---- Cheap current-gen smoke set for wiring checks (~$0.05 over a --limit run) ----
  smoke:
    - anthropic:claude-haiku-4-5-20251001
    - deepseek/deepseek-v3.2

# Default judge. MUST differ from every subject model (harness enforces this).
# gpt-5.4 is near-frontier, reserved (not a subject), and cheap on the OpenAI
# credit (~$16 over a full run). Same-provider-family as the two GPT subjects —
# a minor, disclosed limitation; run a judge-sensitivity pass with a cross-family
# judge (e.g. google:gemini-3.1-pro-preview or anthropic:claude-opus-4-8) before
# publishing.
judge: openai:gpt-5.4
