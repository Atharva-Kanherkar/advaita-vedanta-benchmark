id: mr-002
family: misconception_repair
prompt: >
  Does Advaita say the physical world literally does not exist?
turns: []
target_school: advaita
language: en
rubric_dimensions:
  - misconception_identified
  - correction_quality
  - dialogue_stability
  - pedagogical_tone
gold_points:
  - Distinguish mithyā from tuccha
  - Vyāvahārika validity within avidyā
  - Paramārthika: no second reality besides Brahman
follow_up_turns:
  - role: user
    content: So Advaitins can just walk through walls because walls aren't real?
  - role: user
    content: Sounds like you're saying science is false.
forbidden_claims:
  - yes, the world literally does not exist at all
  - Advaita denies all empirical causality completely
tags: [world_existence_thread]
difficulty: pilot

