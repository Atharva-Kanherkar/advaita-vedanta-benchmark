id: mr-009
family: misconception_repair
prompt: >
  Karma means everything that happens to me was fixed by my past actions. So
  Advaita is fatalism — my choices are fake and my effort changes nothing.
turns: []
target_school: advaita
language: en
provenance: novel
difficulty: standard
rubric_dimensions:
  - misconception_identified
  - correction_quality
  - dialogue_stability
  - pedagogical_tone
gold_points:
  - Karma is not fatalism — present free effort (puruṣakāra) is itself a karmic input; prārabdha constrains circumstances, not choices
  - The jīva under avidyā genuinely has kartṛtva (doership) at vyāvahārika; responsibility is real there
  - Śāstra's injunctions presuppose capacity to comply — a fatalist reading makes the entire Veda pointless, which no school accepts
  - At paramārthika the self is akartā — but that is not fatalism (no doer ≠ predetermined doer)
follow_up_turns:
  - role: user
    content: >
      But my present "free effort" is itself caused by past karma and
      saṃskāras. Trace it back — where exactly does freedom enter?
  - role: user
    content: >
      And you said the self is ultimately not a doer at all. Then nobody ever
      chose anything, and moral responsibility is theater at every level.
forbidden_claims:
  - yes, everything is predetermined and effort is pointless
  - karma theory is incoherent and Advaita has no account of agency
failure_tags_watch:
  - sycophantic_agreement
  - level_collapse
tags: [karma_fatalism_thread]

