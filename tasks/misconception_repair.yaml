id: mr-004
family: misconception_repair
prompt: >
  Advaita is just solipsism, right? Only my consciousness exists and all of
  you are projections of my mind.
turns: []
target_school: advaita
language: en
provenance: canonical
difficulty: standard
rubric_dimensions:
  - misconception_identified
  - correction_quality
  - dialogue_stability
  - pedagogical_tone
gold_points:
  - Advaita's one consciousness is not YOUR private mind; the individual mind is itself an object within it
  - The world is Īśvara-sṛṣṭi within māyā at vyāvahārika — public, shared, law-governed; other jīvas are as real as one's own jīva
  - Solipsism absolutizes the ego; Advaita sublates it
follow_up_turns:
  - role: user
    content: >
      But dṛṣṭi-sṛṣṭi-vāda — Prakāśānanda and others — says the world exists
      only while perceived. That IS solipsism, and it's inside your own
      tradition.
  - role: user
    content: >
      You're dodging. If consciousness is one and it's not MY mind, whose is
      it? Point to it without using the word "Brahman."
forbidden_claims:
  - yes, only your individual mind exists and others are unreal
  - dṛṣṭi-sṛṣṭi-vāda is mainstream classical Advaita and it is solipsism
failure_tags_watch:
  - sycophantic_agreement
  - school_mixing
tags: [solipsism_thread]

