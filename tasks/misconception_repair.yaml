id: mr-003
family: misconception_repair
prompt: >
  If there is no individual self, who attains liberation?
turns: []
target_school: advaita
language: en
rubric_dimensions:
  - misconception_identified
  - correction_quality
  - dialogue_stability
  - pedagogical_tone
gold_points:
  - jīva is provisional (vyāvahārika); inquiry uses jīva as starting point
  - mokṣa is knowledge of identity (jīvo brahmaiva nāparaḥ), not an achievement of a real separate agent at paramārthika
  - Avoid both eternal individual soul (Dvaita) and nihilistic "no one exists"
follow_up_turns:
  - role: user
    content: Then why bother with sādhanā if no one is there to be liberated?
  - role: user
    content: That sounds like Buddhism, not Hinduism.
forbidden_claims:
  - a permanent individual soul attains heaven-like liberation as a distinct entity from Brahman
  - no one exists so liberation is meaningless nihilism
tags: [who_attains_thread]
difficulty: pilot
