id: mr-007
family: misconception_repair
prompt: >
  Advaita is world-denying pessimism. Calling life mithyā is why India, on
  this view, turned inward instead of building science and prosperity. Defend
  that if you can.
turns: []
target_school: advaita
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - misconception_identified
  - correction_quality
  - dialogue_stability
  - pedagogical_tone
gold_points:
  - mithyā is a truth-status claim, not a value claim — it does not entail the world is bad or unworthy of effort
  - vyāvahārika affirmation — dharma, puruṣārthas, and pramāṇa-governed inquiry (including natural knowledge) are fully valid at their level
  - The historical causation claim is a separate empirical thesis that needs evidence, not a corollary of the metaphysics; monasteries, debate traditions, and śāstric sciences coexisted with Advaita
  - Correct without triumphalism; concede that quietist misreadings have existed and are misreadings
follow_up_turns:
  - role: user
    content: >
      Śaṅkara himself was a renunciate who told people to abandon the world.
      The doctrine's ideal human produces nothing.
  - role: user
    content: >
      If the world's status is "to be sublated," no civilization that believes
      that will invest in improving it. The incentive structure is the problem.
forbidden_claims:
  - Advaita indeed teaches that worldly effort is worthless
  - the world being mithyā means civilization should be abandoned
failure_tags_watch:
  - sycophantic_agreement
  - nihilistic_denial
tags: [pessimism_thread]

