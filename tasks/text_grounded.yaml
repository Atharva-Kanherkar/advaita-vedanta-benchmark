id: tg-004
family: text_grounded
prompt: >
  In this Chāndogya passage, what position is being refuted by the rhetorical
  question, and what does "ekam evādvitīyam" rule out? (1) Claim. (2) Quoted
  evidence. (3) Advaita concept. (4) One over-reading to avoid.
passage:
  text: >
    sad eva somyedam agra āsīd ekam evādvitīyam | taddhaika āhur asad
    evedam agra āsīd ekam evādvitīyam | tasmād asataḥ saj jāyata ||
    kutas tu khalu somyaivaṃ syād iti hovāca katham asataḥ saj jāyeteti |
    sat tv eva somyedam agra āsīd ekam evādvitīyam ||
  source: Chāndogya Upaniṣad 6.2.1–2
  tier: A
target_school: advaita
language: mixed
provenance: canonical
difficulty: standard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - Refuted position is asat-kāraṇa-vāda ("in the beginning this was non-being") — how could being arise from non-being?
  - ekam evādvitīyam rules out a second independent principle of any kind (no second sat, no co-eternal matter)
  - Concept mapping includes sat-kārya reasoning toward Brahman as sole cause
  - Over-reading to avoid includes treating this as modern cosmology or as proof of real pariṇāma as final
forbidden_claims:
  - the passage teaches creation from absolute nothingness
  - advitīya only means "one god among lesser gods"
tags: [chandogya, sat_karana]

---
id: tg-005
family: text_grounded
prompt: >
  This is the opening of Śaṅkara's preamble to the Brahma-Sūtra commentary
  (adhyāsa-bhāṣya), in translation. What exactly is superimposed on what, in
  BOTH directions? Why does he call the error "natural" (naisargika)? Cite the
  passage's own phrases.
passage:
  text: >
    It being an established fact that the object and the subject — the sphere
    of the notion "you" and the sphere of the notion "we" — are by nature as
    opposed as darkness and light, and that the one cannot take the place of
    the other, it follows that their attributes can still less do so. Yet,
    coupling the real and the unreal, there is this natural (naisargika)
    worldly practice, "I am this," "this is mine" — a superimposition
    (adhyāsa) of each on the other and of the attributes of each on the other,
    caused by the absence of discrimination.
  source: Brahmasūtra-bhāṣya, adhyāsa-bhāṣya (translated excerpt)
  tier: B
target_school: advaita
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - Mutual superimposition of subject (asmad, the self) and object (yuṣmad, the not-self) AND of their attributes — both directions stated
  - naisargika because beginningless and untaught — operative in all beings prior to philosophy ("I am this, this is mine")
  - The darkness/light opposition is the ground of the error's irrationality, cited from the text
  - Concept mapping is adhyāsa as the definition of avidyā; the whole śāstra exists to remove it
forbidden_claims:
  - only the not-self is superimposed on the self, never the reverse
  - naisargika means the error is correct or divinely intended
tags: [adhyasa_bhasya]

---
id: tg-006
family: text_grounded
prompt: >
  From Taittirīya 2.1 with this bhāṣya fragment, explain why Śaṅkara insists
  satyam, jñānam, and anantam do NOT qualify Brahman the way "blue" qualifies
  "lotus." What do the three words do instead?
passage:
  text: >
    satyaṃ jñānam anantaṃ brahma | (śruti) — The bhāṣya observes that the
    three words are not adjectives distinguishing Brahman from other members
    of a class, as "blue" marks off one lotus among lotuses; since Brahman is
    one and without a second, there is no class and no competing member. The
    words function as definition (lakṣaṇa), not qualification (viśeṣaṇa):
    each removes a misconception — satyam removes unreality/change, jñānam
    removes insentience, anantam removes limitation.
  source: Taittirīya Upaniṣad 2.1 with Śaṅkara-bhāṣya (condensed)
  tier: B
target_school: advaita
language: mixed
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - viśeṣaṇa presupposes a class with members to exclude; advitīya Brahman has neither — the blue-lotus disanalogy stated
  - The words are lakṣaṇa (svarūpa-lakṣaṇa), definitional, functioning by negating misconceptions (mutability, insentience, finitude)
  - Each word guards the others (jñānam prevents satyam from meaning an inert real; anantam prevents jñānam from meaning finite cognition)
  - Over-reading to avoid includes Brahman as a substance possessing three attributes
forbidden_claims:
  - satyam, jñānam, anantam are three properties Brahman possesses
  - the verse distinguishes Brahman from other Brahmans
tags: [taittiriya, lakshana]

