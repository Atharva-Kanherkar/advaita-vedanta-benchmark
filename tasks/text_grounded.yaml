id: tg-008
family: text_grounded
prompt: >
  From Aitareya 3.3 with this bhāṣya gloss: what does the passage do to the
  scope of prajñāna, and what work is the word "netram" doing in the bhāṣya?
  (1) Claim. (2) Quoted evidence. (3) Concept. (4) One over-reading.
passage:
  text: >
    eṣa brahmā eṣa indraḥ eṣa prajāpatiḥ ete sarve devāḥ […] yat kiñcedam
    prāṇi jaṅgamaṃ ca patatri ca yac ca sthāvaram | sarvaṃ tat prajñānetram |
    prajñāne pratiṣṭhitam | prajñānetro lokaḥ | prajñā pratiṣṭhā | prajñānaṃ
    brahma || (bhāṣya:) nīyate 'neneti netram | prajñā netraṃ yasya tad idaṃ
    prajñānetram | prajñāne brahmaṇy utpatti-sthiti-laya-kāleṣu pratiṣṭhitam |
  source: Aitareya Upaniṣad 3.3 with Śaṅkara-bhāṣya, GRETIL e-text
  tier: A
target_school: advaita
language: sa
provenance: canonical
difficulty: hard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - The passage universalizes — gods, elements, all moving and unmoving beings — everything has prajñāna as its ground
  - netram glossed from nī (to lead) — that by which all is led/guided; beings are prajñā-guided
  - pratiṣṭhitam expanded by the bhāṣya to grounding at origination, sustenance, and dissolution — consciousness as substratum, not a property of beings
  - Concept mapping is the mahāvākya prajñānaṃ brahma; consciousness is not an attribute of creatures but their ground
  - Over-reading to avoid includes reading prajñāna as individual intellect or as panpsychism about many little minds
forbidden_claims:
  - prajñāna here means each creature's private intelligence
  - the passage lists Brahmā and Indra as beings ABOVE Brahman
tags: [aitareya_bhasya, prajnanam_brahma, held_out]

---
id: tg-009
family: text_grounded
prompt: >
  This exchange is condensed from the prose portion of Śaṅkara's
  Upadeśasāhasrī. Name the teaching METHOD being used (not just the content),
  and show from the text how the teacher's procedure embodies it.
passage:
  text: >
    The student, having approached, said: "Sir, I am subject to birth and
    death; I experience the misery of this body; teach me how to be free."
    The teacher said: "You are not as you take yourself. You say 'I was born,
    I will die, I suffer' — but birth belongs to the body, which is a
    combination of elements; death belongs to it too. Hunger and thirst belong
    to the vital airs; desire and grief to the mind. You are the witness of
    all these, changeless. Whatever you can observe as 'this' — body, breath,
    mind — cannot be 'you,' the observer. First the self was spoken of as if
    it had come into the body; now even that is withdrawn: you never entered,
    for you were never elsewhere. The entering was taught only to direct you
    inward."
  source: Upadeśasāhasrī, gadya-prabandha (condensed translation)
  tier: B
target_school: advaita
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - Method is adhyāropa-apavāda — deliberate provisional attribution (the self "entered" the body) later withdrawn ("you never entered")
  - Also operative are anvaya-vyatireka / dṛg-dṛśya discrimination — whatever is observed as "this" is not the observer
  - Textual evidence includes the explicit withdrawal line ("the entering was taught only to direct you inward")
  - Concept mapping is deśika-method pedagogy; teaching statements are means, sublated after doing their work
forbidden_claims:
  - the teacher contradicts himself about the self entering the body
  - the method is guided meditation or devotional surrender
tags: [upadesasahasri, adhyaropa_apavada]

---
id: tg-010
family: text_grounded
prompt: >
  In Gauḍapāda-kārikā 2.32, what exactly is denied, at which level of truth,
  and what would be an over-reading? (1) Claim. (2) Quoted evidence.
  (3) Concept. (4) Over-reading.
passage:
  text: >
    na nirodho na cotpattir na baddho na ca sādhakaḥ |
    na mumukṣur na vai mukta ity eṣā paramārthatā ||
  source: Gauḍapāda-kārikā (Māṇḍūkya-kārikā) 2.32
  tier: B
target_school: advaita
language: sa
provenance: canonical
difficulty: hard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - Denied are cessation, origination, bound one, striver, liberation-seeker, liberated one — the whole soteriological drama
  - The denial is explicitly indexed to the absolute (ity eṣā paramārthatā) — the verse itself supplies the level
  - Concept mapping is ajātivāda grounded in the changeless ātman
  - Over-reading includes using the verse to cancel vyāvahārika sādhanā ("since no one is bound, do nothing") — the verse states the paramārthika fact, it does not legislate empirical practice
forbidden_claims:
  - the verse means seekers should abandon all practice now
  - the verse teaches Buddhist non-origination with no substratum
failure_tags_watch:
  - level_collapse
  - school_mixing
tags: [gaudapada, ajativada]

