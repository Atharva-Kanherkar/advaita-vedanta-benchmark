id: tg-011
family: text_grounded
prompt: >
  Read the passage and answer: (1) What is its central claim? (2) Which school
  does it belong to, judging ONLY from its content? (3) If your answer is not
  Advaita, say precisely which phrases are incompatible with classical Advaita
  rather than forcing an Advaita reading.
passage:
  text: >
    The highest Brahman is the sole cause of the world, a treasure-house of
    countless auspicious qualities, free of all imperfection. All conscious
    selves and all non-conscious matter constitute its body, and it is their
    inner Self and controller; the words "you" and "that" in scripture both
    finally denote this one Brahman as qualified by its modes. Hence the unity
    scripture teaches is the unity of one qualified whole — not the identity
    of an attributeless consciousness with a self stripped of individuality.
  source: withheld (identify from content)
  tier: B
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - Identified as Viśiṣṭādvaita (Rāmānuja's position; Śrī-bhāṣya-style)
  - Diagnostic phrases cited include body-of-Brahman (śarīra-śarīri), treasure-house of auspicious qualities (kalyāṇa-guṇa), unity-as-qualified-whole, explicit rejection of attributeless consciousness
  - Model must NOT force an Advaita reading; interpretive honesty is the tested skill
  - Bonus accuracy includes the tat-tvam-asi coordination (sāmānādhikaraṇya) read through modes
forbidden_claims:
  - this is a classical Advaita text
  - the passage is compatible with nirguṇa Brahman as final
failure_tags_watch:
  - school_mixing
  - text_ungrounded
tags: [distractor, visistadvaita_passage]
