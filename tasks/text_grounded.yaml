id: tg-007
family: text_grounded
prompt: >
  This is from the ānanda-mīmāṃsā of the Taittirīya-bhāṣya. What is the
  question the bhāṣya raises about ānanda, and what is its final position on
  the relation between worldly joys and the bliss of Brahman? (1) Claim.
  (2) Quoted evidence. (3) Concept.
passage:
  text: >
    tasyāsya brahmaṇa ānandasyaiṣā mīmāṃsā vicāraṇā bhavati | kim ānando
    viṣayaviṣayisambandhajanito laukikānandavad āhosvit svābhāvika iti […]
    laukiko 'py ānando brahmānandasyaiva mātrā […] niraste tv avidyākṛte
    viṣayaviṣayivibhāge vidyayā svābhāvikaḥ paripūrṇa eka ānando 'dvaito
    bhavati […] sa eṣa ānando yasya mātrā samudrāmbhasa iva vipruṣaḥ
    pravibhaktā yatraikatāṃ gatāḥ sa eṣa paramānandaḥ svābhāvikaḥ advaitatvāt |
  source: Taittirīya-Upaniṣad-bhāṣya on 2.8 (ānanda-mīmāṃsā), GRETIL e-text
  tier: B
target_school: advaita
language: sa
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - The mīmāṃsā question is whether ānanda is relational — born of subject-object contact like worldly pleasure — or intrinsic (svābhāvika)
  - Final position is svābhāvika, and worldly joys are fractions (mātrā) of brahmānanda, as drops to the ocean
  - When the avidyā-made subject-object division is removed by vidyā, the one non-dual complete bliss remains
  - Concept mapping is ānanda as Brahman's svarūpa, not an experienced object-state
forbidden_claims:
  - the passage says worldly pleasure and brahmānanda are unrelated in kind
  - brahmānanda is the highest relational pleasure, produced by the best contact
tags: [taittiriya_bhasya, ananda_mimamsa, held_out]

