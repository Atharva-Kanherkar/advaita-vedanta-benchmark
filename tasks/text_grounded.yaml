id: tg-003
family: text_grounded
prompt: >
  In Bhagavad Gītā 2.20, what is the argument about the ātman and death?
  Ground your answer in the verse's terms (ajas, nitya, śāśvata).
passage:
  text: >
    na jāyate mriyate vā kadācin nāyaṃ bhūtvā bhavitā vā na bhūyaḥ |
    ajo nityaḥ śāśvato 'yaṃ purāṇo na hanyate hanyamāne śarīre ||
  source: Bhagavad Gītā 2.20
  tier: A
target_school: advaita
language: mixed
rubric_dimensions:
  - claim_extraction
  - textual_evidence
  - interpretive_restraint
  - concept_mapping
gold_points:
  - Ātman is unborn, eternal, not slain when body is slain
  - Addresses grief/fear via nature of self (Advaita reads via adhyāsa framework)
forbidden_claims:
  - the verse proves the empirical person never dies in all senses
tags: [gita]
difficulty: pilot
