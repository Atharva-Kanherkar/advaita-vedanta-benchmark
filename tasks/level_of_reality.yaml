id: lor-003
family: level_of_reality
prompt: >
  After liberation (jñāna), does the jīva continue to act in the world?
  Explain without contradicting Advaita's two levels of truth.
target_school: advaita
language: en
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Jivanmukti: body-mind may continue vyāvahārika functioning
  - Paramārthika: no real agent left to "attain" as separate entity
  - Prarabdha karma may operate until exhaustion
forbidden_claims:
  - the liberated person literally ceases all appearance instantly in all accounts
  - liberation creates a new permanent individual soul
tags: [jivanmukti]
difficulty: pilot

