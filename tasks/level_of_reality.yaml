id: lor-004
family: level_of_reality
prompt: >
  Is Īśvara real, in Advaita? Answer without demoting Īśvara to "mere
  illusion" and without promoting Īśvara to paramārthika.
target_school: advaita
language: en
provenance: canonical
difficulty: standard
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Īśvara fully real and sovereign at vyāvahārika — creator, karma-phala-dātā, worship-worthy
  - At paramārthika, Īśvaratva is upādhi-dependent (māyā); only nirguṇa Brahman remains
  - Both statements held together without contradiction; worship and grace valid for the seeker
forbidden_claims:
  - Īśvara is a fiction and devotion is wasted effort
  - Īśvara is ultimately real as a qualified being (Viśiṣṭādvaita import)
failure_tags_watch:
  - level_collapse
  - school_mixing
tags: [isvara_levels]

