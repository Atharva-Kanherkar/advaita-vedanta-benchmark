id: lor-010
family: level_of_reality
prompt: >
  Sort these four with Advaita's level-vocabulary, justifying each: a
  hallucinated voice heard during fever, a desert mirage, the events of a
  movie you are watching, and the value of paper money.
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Hallucinated voice = prātibhāsika (private, sublated on recovery)
  - Mirage = prātibhāsika appearance on a vyāvahārika base (light phenomenon is public; the "water" is sublated on approach)
  - Movie events = known fiction within vyāvahārika — not an error to be sublated but a represented content; distinguishing represented-fiction from perceptual error shows real understanding
  - Money's value = vyāvahārika-by-convention (saṃketa) — public, effective, dependent on collective acceptance, not on private error
  - Overall: prātibhāsika/vyāvahārika is not a rigid two-box sort; the justification (what sublates what, private vs public) carries the score
forbidden_claims:
  - all four are the same kind of unreality
  - money and hallucinations are both prātibhāsika in the same sense
tags: [transfer_case, level_sorting]
