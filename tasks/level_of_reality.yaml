id: lor-002
family: level_of_reality
prompt: >
  Does Advaita claim the physical world literally does not exist?
  Distinguish paramārthika, vyāvahārika, and prātibhāsika in your answer.
target_school: advaita
language: en
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - World is mithyā / adhyāsa-rūpa, not tuccha
  - Vyāvahārika order is valid within avidyā (causal, practical)
  - Paramārthika: only Brahman; no second entity
  - Prātibhāsika: subjective appearances (e.g., snake on rope) sublated differently
required_distinctions:
  - mithyā vs absolute non-existence
  - vyāvahārika vs prātibhāsika
forbidden_claims:
  - Advaita says the world is completely fake and can be treated as nothing
  - there is only one level of reality
tags: [world_existence]
difficulty: pilot

