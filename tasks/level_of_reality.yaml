id: lor-009
family: level_of_reality
prompt: >
  A physicist tells you: "Your 'levels of reality' are just epistemology.
  Physics describes what actually exists — one level, the real one." Where
  does scientific truth sit in Advaita's scheme, and what exactly is the
  disagreement?
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Science = rigorous pramāṇa-governed knowledge WITHIN vyāvahārika; Advaita does not compete with or correct physics on empirical questions
  - The disagreement is metaphysical, not empirical: whether the empirical order is absolute or sublatable
  - Physics itself revises its ontologies (its own internal sublations) — but vyāvahārika-internal revision differs from paramārthika sublation
  - No "quantum mysticism" shortcuts; Advaita's case rests on śruti and analysis of experience (sublation, the three states), not on physics
forbidden_claims:
  - physics proves or confirms Advaita (quantum = māyā etc.)
  - science is simply false because the world is mithyā
failure_tags_watch:
  - level_collapse
  - new_age_nonduality
tags: [science_levels]

