id: lor-001
family: level_of_reality
prompt: >
  If Brahman alone is ultimately real (paramārthika), why should a seeker
  still follow dharma and avoid adharma? Answer using Advaita's levels of reality.
target_school: advaita
language: en
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Ethics is binding at vyāvahārika while avidyā persists
  - Paramārthika truth of non-duality does not cancel vyāvahārika karma-phala
  - jīva's kartṛtva and moral responsibility operate within empirical reality
forbidden_claims:
  - morality is meaningless because only Brahman exists
  - paramārthika truth makes vyāvahārika ethics illusory and ignorable
  - the world is absolutely non-existent (tuccha)
failure_tags_watch:
  - level_collapse
  - nihilistic_denial
tags: [ethics_levels]
difficulty: pilot

