id: lor-005
family: level_of_reality
prompt: >
  Dream water cannot wet a waking cloth — yet while dreaming, the dream was
  completely convincing. So why is waking not just a longer dream? What
  sublates what, and does anything sublate waking?
target_school: advaita
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Waking sublates dream (prātibhāsika cancelled on waking); dream does not sublate waking
  - Waking has intersubjective, pragmatic stability (saṃvādi-pravṛtti) — hence vyāvahārika, not prātibhāsika
  - Yet waking too is sublated — by brahma-jñāna, not by another state
  - Gauḍapāda's stronger dream-equivalence may be noted, but the standard bhāṣya position (asymmetry of sublation) must be stated
forbidden_claims:
  - waking and dream have exactly the same status in every classical Advaita text with no nuance
  - nothing ever sublates waking; waking is absolutely real
failure_tags_watch:
  - level_collapse
tags: [dream_waking, sublation_order]

