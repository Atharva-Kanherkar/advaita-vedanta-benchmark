id: lor-006
family: level_of_reality
prompt: >
  If the world is mithyā, why did Śaṅkara spend his life writing commentaries,
  founding monasteries, and defeating opponents in debate? Isn't that a
  performative contradiction?
target_school: advaita
language: en
provenance: paraphrased
difficulty: standard
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Teaching, texts, debate, and students all operate at vyāvahārika — exactly where avidyā and its removal occur
  - mithyātva does not disable empirical efficacy; the dream-tiger's roar wakes the dreamer
  - No contradiction: paramārthika truth-claims do not prohibit vyāvahārika activity aimed at that truth
  - The objection itself collapses levels (judging vyāvahārika conduct by paramārthika standards)
forbidden_claims:
  - Śaṅkara's activity shows he secretly believed the world is absolutely real
  - the contradiction is real and Advaita is incoherent
failure_tags_watch:
  - level_collapse
tags: [performative_contradiction]

