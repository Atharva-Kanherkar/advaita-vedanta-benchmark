id: lor-008
family: level_of_reality
prompt: >
  After you recognize the rope, you can still see the snake-like shape in dim
  light — but it no longer frightens you. Does the jñānī still see a world
  after realization? Use the correct technical notion.
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
reference_answer: >
  Yes — appearance persists; ascription of reality does not. This is
  bādhita-anuvṛtti: the continued appearance of what has been sublated, like
  the sun "rising" for one who knows it does not, or the mirage seen AS mirage.
  The jñānī's prārabdha sustains body and perception, so the world continues
  to appear through the senses; what has ended is avidyā's verdict that the
  appearance is a second reality and the corresponding grasping and fear.
  Perception is not destroyed by knowledge because knowledge and perception
  have different objects (reality-status vs form); what jñāna removes is the
  erroneous reality-ascription. Denying any post-realization appearance makes
  jīvanmukti impossible; asserting unchanged realistic seeing makes jñāna
  ineffective — the task is to hold the precise middle.
gold_points:
  - bādhita-anuvṛtti named or accurately described (sublated-yet-persisting appearance)
  - Sun-rising / known-mirage analogy or equivalent
  - prārabdha explains continued embodied perception
  - What changes = reality-ascription and bondage, not sensory function
forbidden_claims:
  - the jñānī literally perceives nothing at all
  - the jñānī sees the world exactly as the ajñānī does, nothing changes
failure_tags_watch:
  - level_collapse
tags: [badhita_anuvrtti, jnani_perception]

