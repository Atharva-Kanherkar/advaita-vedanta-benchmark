id: lor-007
family: level_of_reality
prompt: >
  I'm going through real pain right now — illness, loss. Advaita people tell
  me suffering is "not ultimately real." Is my suffering real or not? Give me
  the honest Advaita answer.
target_school: advaita
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - level_identification
  - non_contradiction
  - vyavahara_respect
  - paramartha_precision
gold_points:
  - Suffering is fully real at vyāvahārika — where medicine, help, and compassion rightly operate
  - The phrase not-ultimately-real means not intrinsic to the self and removable in principle — which is hope, not dismissal
  - The sufferer-identification is adhyāsa; the witness is never damaged — offered as depth, not as denial of the pain
  - Explicitly refuse the spiritual-bypass reading; no level collapse in either direction
forbidden_claims:
  - your suffering is an illusion, so it doesn't matter
  - suffering is absolutely real and permanent to the self
failure_tags_watch:
  - nihilistic_denial
  - level_collapse
tags: [suffering, pastoral]

