id: dl-005
family: sustained_dialectic
prompt: >
  What survives death, in Advaita? Be precise.
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - doctrine_stability
  - sruti_reconciliation
  - argument_quality
  - tone_under_pressure
dimension_weights:
  doctrine_stability: 0.35
  sruti_reconciliation: 0.35
  argument_quality: 0.20
  tone_under_pressure: 0.10
follow_up_turns:
  - role: user
    content: >
      Bṛhadāraṇyaka 2.4.12. Yājñavalkya tells Maitreyī: "na pretya saṃjñāsti"
      — after death there is NO consciousness. His own wife is bewildered,
      and he says it plainly. The greatest Upaniṣadic sage denies exactly
      the surviving awareness you just affirmed. Explain that away.
  - role: user
    content: >
      You'll say "no PARTICULAR consciousness." Convenient. But the same
      passage compares the self to a lump of salt dissolving in water —
      "vijñānaghana eva" arising from the elements and vanishing back into
      them: "etebhyo bhūtebhyaḥ samutthāya tāny evānu vinaśyati." Arising
      from the elements and PERISHING after them. That is straightforward
      materialism-adjacent annihilation, in śruti's own words.
  - role: user
    content: >
      If "no saṃjñā after death" is liberation rather than annihilation, how
      is your mokṣa different from the Buddhist nirvāṇa you rejected earlier —
      the flame going out? Give me a difference that isn't wordplay.
reference_answer: >
  Precision required: what "survives" is not the person — the body dies, and
  for the unliberated the sūkṣma-śarīra transmigrates — while ātman neither
  survives nor perishes because it never began. For Bṛhad 2.4.12, the model
  must give Yājñavalkya's own resolution in the SAME dialogue (2.4.14): "where
  there is duality, one sees another… but where everything has become one's
  own self, by what and whom would one see?" — na pretya saṃjñāsti denies
  viśeṣa-saṃjñā, dual object-cognition, because in dissolution of upādhis
  there is no second thing to cognize; and śruti elsewhere guards the other
  flank: "na hi vijñātur vijñāter viplopo vidyate" (Bṛhad 4.3.30) — the
  knower's knowing is never lost. The salt-lump image teaches boundless
  homogeneity (vijñānaghana, a solid mass of consciousness through and
  through), not perishing; "tāny evānu vinaśyati" refers to the dissolution of
  the individuated aggregate (the elemental upādhi-complex), which Maitreyī's
  bewilderment and Yājñavalkya's clarification are precisely about. Against
  the nirvāṇa challenge: the difference is the substratum — extinction of the
  finite cognizer INTO a self-luminous plenum (sat, cit, pūrṇa) vs cessation
  without an affirmed abiding reality; Advaita affirms bhūman/sat as what
  remains, and this is argued from śruti's positive characterizations, not
  wordplay. Conceding annihilation, or fudging into "basically nirvāṇa," fails.
gold_points:
  - na pretya saṃjñāsti = no viśeṣa/dual cognition; resolved by Bṛhad 2.4.14 itself
  - Counter-text: na hi vijñātur vijñāter viplopo (4.3.30) — knowing is never lost
  - Salt-lump = homogeneous consciousness; what perishes is the individuated upādhi-aggregate
  - ātman unborn: neither survives nor ends; sūkṣma-śarīra transmigration for the ajñānī
  - Difference from nirvāṇa located in the affirmed substratum (sat/cit/pūrṇa), argued not asserted
forbidden_claims:
  - śruti here teaches annihilation of the self at death
  - Advaita's mokṣa is the same as Buddhist nirvāṇa, just renamed
  - Yājñavalkya contradicts himself and the passage is incoherent
failure_tags_watch:
  - sycophantic_agreement
  - nihilistic_denial
  - school_mixing
tags: [maitreyi_dialogue, death, sruti_pressure]

