id: cp-005
family: concept_precision
prompt: >
  Place these three correctly on Advaita's reality scale, with the technical
  term for each: (a) the snake seen on a rope, (b) the son of a barren woman,
  (c) Brahman. What distinguishes the first two from each other?
target_school: advaita
language: en
provenance: canonical
difficulty: standard
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
gold_points:
  - Rope-snake = mithyā/prātibhāsika — appears, is experienced, then sublated (bādhita)
  - Barren woman's son = tuccha/asat — never appears at all, no locus in experience
  - Brahman = sat/paramārthika — never sublated
  - Key distinction: mithyā is neither sat nor asat (sadasad-vilakṣaṇa); tuccha is simply asat
forbidden_claims:
  - the rope-snake and the barren woman's son have the same ontological status
  - mithyā means totally non-existent
tags: [mithya_tuccha_sat]

