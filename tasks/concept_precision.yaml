id: cp-006
family: concept_precision
prompt: >
  The Upaniṣads define Brahman both as "satyaṃ jñānam anantam" and as "that
  from which these beings are born." Advaita treats these as two different
  KINDS of definition. Name the two kinds and explain why the difference
  matters.
target_school: advaita
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
reference_answer: >
  satyaṃ jñānam anantam (Taittirīya 2.1) is the svarūpa-lakṣaṇa — a definition
  by Brahman's own nature, holding always. "That from which beings are born…"
  (Taittirīya 3.1, echoed in Brahma Sūtra 1.1.2 janmādy asya yataḥ) is the
  taṭastha-lakṣaṇa — an accidental/indicative mark that identifies Brahman via
  a relation (world-causality) that does not belong to its essence, as one
  identifies a house by the crow momentarily sitting on it. The difference
  matters because world-causality is upādhi-dependent and ultimately sublated:
  if creatorship were Brahman's svarūpa, Brahman could never be known as
  nirguṇa and mokṣa as dissociation from all relation would be impossible.
  The taṭastha-lakṣaṇa points the seeker to the referent; the svarūpa-lakṣaṇa
  states what it is.
gold_points:
  - svarūpa-lakṣaṇa vs taṭastha-lakṣaṇa, correctly assigned
  - Crow-on-the-house (or equivalent) logic of the accidental mark
  - Causality is not Brahman's essence; sublated with the world
  - Why the distinction protects nirguṇatva and mokṣa
forbidden_claims:
  - both are essential definitions and Brahman is essentially a creator
  - the two definitions contradict each other
tags: [lakshana_types]

---
id: cp-007
family: concept_precision
prompt: >
  If Brahman is self-luminous and never an object, what exactly does the final
  cognition (the akhaṇḍākāra-vṛtti) DO in Advaita's account of liberation?
  Distinguish vṛtti-jñāna from svarūpa-jñāna.
target_school: advaita
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
reference_answer: >
  svarūpa-jñāna is consciousness as Brahman's very nature — ever-present,
  never produced, never absent. vṛtti-jñāna is a mental mode of the
  antaḥkaraṇa. Liberating knowledge is a vṛtti (the akhaṇḍākāra-vṛtti shaped
  by the mahāvākya), but its function is purely negative: it removes the
  ignorance covering the ever-attained self. Advaita's standard formula: the
  vṛtti destroys ajñāna (vṛtti-vyāpti) but the resulting "illumination" is not
  the vṛtti's doing — Brahman, being self-luminous, needs no phala-vyāpti,
  unlike a pot which needs both the mode and reflected consciousness to be
  known. So nothing new is produced or reached: the vṛtti is the last cognition,
  which removes the obstruction and lapses, like the medicine that purges
  itself along with the disease.
gold_points:
  - svarūpa-jñāna = Brahman's nature, unproduced; vṛtti-jñāna = mental mode
  - akhaṇḍākāra-vṛtti removes avidyā; does not illuminate or produce Brahman
  - vṛtti-vyāpti without phala-vyāpti for Brahman (contrast with pot-cognition)
  - mokṣa not a new attainment; obstruction-removal model
forbidden_claims:
  - the final cognition creates or reaches Brahman as a new object
  - Brahman is known as an object the way a pot is known
tags: [vritti_jnana]

---
id: cp-008
family: concept_precision
prompt: >
  A student says: "The consciousness present in my thoughts right now — that
  IS the witness, the sākṣī." Correct this with precision using the concept of
  cidābhāsa. Note where classical sub-schools describe this differently.
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
reference_answer: >
  The consciousness apparently located "in" thoughts is cidābhāsa — the
  reflection/semblance of consciousness in the antaḥkaraṇa-vṛtti. It is
  mind-bound, arises and subsides with the vṛtti, and appears as the finite
  knower. The sākṣī is the original consciousness that illumines both the
  vṛtti and its reflection, itself unmodified. Conflating them makes
  consciousness an intermittent mental property. Sub-school tolerance:
  pratibimba-vāda (Vivaraṇa) treats the jīva as a real-enough reflection;
  ābhāsa-vāda (per Sureśvara's usage) treats it as a mere semblance;
  avaccheda-vāda (Bhāmatī-associated) prefers delimitation by the upādhi over
  reflection. Any of these frameworks, used consistently, is acceptable — the
  non-negotiable is the distinction between reflected/delimited consciousness
  and the unmodified witness.
gold_points:
  - cidābhāsa = reflected consciousness in the vṛtti; arises/subsides with it
  - sākṣī = original, unmodified illuminator of vṛtti AND reflection
  - Error diagnosed: making consciousness a mental, intermittent property
  - Sub-school variation (pratibimba/ābhāsa/avaccheda) acknowledged, any used consistently
forbidden_claims:
  - the witness is a function or state of the mind
  - cidābhāsa and sākṣī are just two words for the same thing
tags: [cidabhasa_sakshi]

