id: cp-003
family: concept_precision
prompt: >
  Explain sākṣī (witness), antaḥkaraṇa, and upādhi in Advaita.
  Why is sākṣī not simply another mental function?
target_school: advaita
language: mixed
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
gold_points:
  - antaḥkaraṇa = manas, buddhi, ahaṃkāra, citta (mental apparatus)
  - sākṣī = witness consciousness; illuminates vṛtti-s without being modified by them
  - upādhi = limiting adjunct (body, mind) causing apparent limitation of self
forbidden_claims:
  - sākṣī is a part of the mind like manas
  - upādhi literally creates a second self
tags: [sakshi_upadhi]
difficulty: pilot
