id: cp-004
family: concept_precision
prompt: >
  In Advaita, what is the difference between Brahman and Īśvara? Is Īśvara
  "less real" than Brahman — and if so, in what precise sense?
target_school: advaita
language: en
provenance: canonical
difficulty: standard
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
gold_points:
  - Īśvara = Brahman with the upādhi of māyā (saguṇa); nirguṇa Brahman in itself
  - Not two entities; one reality viewed with/without adjunct
  - Īśvara fully real at vyāvahārika (creator, karma-phala-dātā, object of worship)
  - The sense of less-real is only upādhi-dependence at paramārthika, not that Īśvara is a fiction
forbidden_claims:
  - Īśvara is a second, separate deity below Brahman
  - Īśvara is a mere illusion and worship is meaningless
  - Brahman and Īśvara are simply synonyms with no distinction
tags: [brahman_isvara]

