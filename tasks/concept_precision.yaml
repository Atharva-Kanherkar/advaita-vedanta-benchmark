id: cp-010
family: concept_precision
prompt: >
  Distinguish jīvanmukti from videhamukti. When the jñānī's body finally
  falls, does the jñānī gain anything that jīvanmukti lacked?
target_school: advaita
language: en
provenance: novel
difficulty: standard
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
gold_points:
  - jīvanmukti = liberation while living; jñāna has destroyed sañcita and āgāmi karma; prārabdha runs on
  - videhamukti = the same liberation with the prārabdha-sustained body ended; no new attainment
  - mokṣa is knowledge, complete at jñāna; death adds nothing (no "final upgrade" event)
  - Watch: treating videhamukti as the real liberation makes mokṣa an event for an agent — a category error at paramārthika
forbidden_claims:
  - final liberation only truly occurs at death
  - the jīvanmukta is still partially bound until the body falls
tags: [jivanmukti_videhamukti]
