id: cp-009
family: concept_precision
prompt: >
  "The snake was never on the rope" and "there is no pot on this table" — are
  these the same kind of negation in Advaita? Explain bādha and why the
  difference carries the whole doctrine of mithyātva.
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
reference_answer: >
  No. "No pot on the table" is simple absence (abhāva): the pot exists
  elsewhere and is merely not here; no error is corrected. "The snake was
  never on the rope" is bādha (sublation): something was EXPERIENCED as
  present and is then cancelled with a substratum-revealing cognition — "not
  snake, only rope, and never was snake." Bādha thus involves three features
  absent from mere negation: prior erroneous appearance, retrospective
  cancellation (never was, even while seen), and a persisting substratum that
  was mistaken. Mithyātva is defined by sublatability: the world is neither
  sat (it is sublated in brahma-jñāna) nor asat (unlike the barren woman's
  son, it appears and functions). Without the bādha/abhāva distinction,
  "the world is false" collapses into either commonsense absence or
  nihilism — the two misreadings Advaita most needs to block.
gold_points:
  - abhāva = simple absence; bādha = cancellation of an experienced error with substratum
  - Retrospective force of bādha ("never was" while it appeared)
  - mithyātva defined via sublatability (sadasad-vilakṣaṇa)
  - Why the distinction blocks both nihilism and naive realism
forbidden_claims:
  - sublation and ordinary absence are the same negation
  - mithyā means the world is absent the way the pot is absent from the table
tags: [badha_abhava]

