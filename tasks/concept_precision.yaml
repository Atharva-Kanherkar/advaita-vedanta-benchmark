id: cp-002
family: concept_precision
prompt: >
  What is the difference between māyā, avidyā, and mithyā in Advaita?
  When are they related and when must they be kept distinct?
target_school: advaita
language: en
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
gold_points:
  - mithyā denotes dependent reality (neither sat nor asat like tuccha)
  - avidyā is beginningless ignorance at the individual level (avidyā-kārya)
  - māyā is often used for the cosmic power/principle associated with Īśvara
  - commentarial nuance exists; model should acknowledge without collapsing all three
forbidden_claims:
  - mithyā means completely non-existent in the everyday sense
  - avidyā and māyā are always identical with no nuance
required_distinctions:
  - mithyā vs tuccha
  - avidyā vs māyā (at least one classical distinction)
tags: [maya_avidya_mithya]
difficulty: pilot

