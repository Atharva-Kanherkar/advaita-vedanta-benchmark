id: cp-001
family: concept_precision
prompt: >
  In classical Advaita Vedānta, explain the difference between Brahman, Ātman,
  and jīva. Do not treat them as synonyms.
target_school: advaita
language: en
rubric_dimensions:
  - term_accuracy
  - distinction_clarity
  - advaita_framing
  - pedagogical_clarity
dimension_weights:
  term_accuracy: 0.35
  distinction_clarity: 0.35
  advaita_framing: 0.20
  pedagogical_clarity: 0.10
gold_points:
  - Brahman is the non-dual absolute (nirguṇa at paramārthika)
  - Ātman is Brahman as the inner self; not distinct from Brahman at paramārthika
  - jīva is the empirical individual self (ātman identified with body-mind via upādhi-s and avidyā)
required_distinctions:
  - jīva vs Ātman
  - Ātman vs Brahman (identity at paramārthika, not two substances)
forbidden_claims:
  - jīva and Brahman are eternally separate substances
  - Ātman is merely the ego
  - all three terms mean the same thing
failure_tags_watch:
  - school_mixing
  - synonym_collapse
tags: [core_lexicon, brahman_atman_jiva]
difficulty: pilot

