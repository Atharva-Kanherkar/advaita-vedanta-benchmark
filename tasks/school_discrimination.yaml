id: sd-004
family: school_discrimination
prompt: >
  Someone online wrote: "Non-duality means the universe is a dream in your
  mind and you can manifest anything." Identify why this is NOT classical Advaita.
target_school: advaita
language: en
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
gold_points:
  - Classical Advaita is not solipsistic manifestation teaching
  - māyā/avidyā framework ≠ Law of Attraction
  - Īśvara/sṛṣṭi has place in Advaita; not "my personal mind creates the cosmos"
forbidden_claims:
  - classical Advaita teaches you can manifest anything you want
  - the universe is literally your personal dream with no Īśvara
failure_tags_watch:
  - new_age_nonduality
tags: [new_age_trap]
difficulty: pilot
