id: sd-009
family: school_discrimination
prompt: >
  "Advaita is basically Spinoza: God and the universe are one substance —
  pantheism with Sanskrit vocabulary." Where does this comparison break down?
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
gold_points:
  - In pantheism the world is real and identical with or constitutive of God; in Advaita the world is mithyā — Brahman is not the SUM of things but their sublating substratum
  - Brahman is nirguṇa consciousness, not a substance with infinite real attributes (contrast natura naturans/naturata, thought and extension as real attributes)
  - Advaita is closer to acosmism about the world than to pantheism (a fair one-line contrast)
  - Liberation by knowledge/sublation has no real Spinozan equivalent (amor dei intellectualis is not bādha)
forbidden_claims:
  - Advaita teaches that the universe as such is God
  - the two systems are equivalent metaphysics
failure_tags_watch:
  - school_mixing
tags: [pantheism_contrast]

