id: sd-005
family: school_discrimination
prompt: >
  Present Rāmānuja's actual objections to Advaita — at least the charge that a
  wholly attributeless (nirviśeṣa) Brahman cannot be established by any means
  of knowledge, and the appeal to difference-affirming śruti. Then give the
  classical Advaita reply. Be fair to both sides.
target_school: advaita
contrast_school: visistadvaita
language: en
provenance: canonical
difficulty: hard
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
gold_points:
  - Rāmānuja stated fairly: all pramāṇas (including śruti's own sentences) deliver qualified objects; nirviśeṣa-vastu is unestablishable; jagat and jīvas form Brahman's body (śarīra-śarīri-bhāva); identity-texts read as soul-body coordination, not bare identity
  - Advaita reply: śruti's negations (neti neti) function precisely to remove determinations, not to predicate new ones; self-luminous consciousness needs no objectifying pramāṇa; difference-texts serve upāsanā/vyavahāra
  - The two systems disagree on the FINAL import (tātparya) of the same canon — locate the dispute there, not in mutual ignorance
forbidden_claims:
  - Rāmānuja simply misunderstood Advaita
  - the two schools really teach the same thing in different words
  - Śaṅkara taught that Brahman has auspicious qualities as its final nature
failure_tags_watch:
  - school_mixing
tags: [advaita_vs_visistadvaita]

