id: sd-001
family: school_discrimination
prompt: >
  Compare Advaita and Dvaita on the relationship between the individual soul
  (jīva) and God (Īśvara/Brahman). State each school's position clearly.
target_school: advaita
contrast_school: dvaita
language: en
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
gold_points:
  - Advaita: jīva's difference from Brahman is due to upādhi/avidyā; identity at paramārthika
  - Dvaita (Madhva): eternal real difference between jīva and Viṣṇu; jīvas are ontologically dependent but distinct
forbidden_claims:
  - Madhva and Śaṅkara agree that jīva and Brahman are identical
  - both schools say the same thing in different words
tags: [advaita_vs_dvaita]
difficulty: pilot

