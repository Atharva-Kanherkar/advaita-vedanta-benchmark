id: sd-006
family: school_discrimination
prompt: >
  Kashmir Shaivism (Pratyabhijñā) is also a "non-dual consciousness" school.
  A student concludes it must be the same as Advaita Vedānta. Where exactly do
  they diverge?
target_school: advaita
contrast_school: kashmir_shaivism
language: en
provenance: paraphrased
difficulty: hard
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
reference_answer: >
  Both affirm one consciousness, but they diverge on whether that consciousness
  really acts. In Pratyabhijñā, Śiva's śakti — svātantrya, spanda — is real and
  intrinsic: the world is a genuine self-expression (ābhāsa) of consciousness,
  a real dynamism, and the universe is consciousness's own glory. Advaita denies
  intrinsic dynamism in Brahman: activity, power, and manifestation belong to
  māyā, and the world is vivarta — apparent transformation only; nirguṇa Brahman
  is actionless (niṣkriya). Correspondingly, Kashmir Shaivism affirms the world
  as real appearance OF the real, while Advaita classes it as mithyā. Method
  also differs: recognition (pratyabhijñā) of oneself as the active Lord vs
  knowledge that sublates superimposition; and Kashmir Shaivism is Tantra-based
  (āgama), Advaita Vedānta śruti-based (Upaniṣads via Uttara-Mīmāṃsā). Same
  slogan — "consciousness alone" — two incompatible accounts of its relation to
  the world.
gold_points:
  - Real śakti/spanda/svātantrya (KS) vs māyā-dependent appearance, niṣkriya Brahman (Advaita)
  - World as real self-expression (KS ābhāsa) vs mithyā/vivarta (Advaita)
  - Scriptural bases differ (āgama/Tantra vs Upaniṣadic śruti)
  - Nonduality-slogan overlap ≠ doctrinal identity
forbidden_claims:
  - Kashmir Shaivism and Advaita are the same teaching with different deity names
  - Śaṅkara accepted a really dynamic Brahman
failure_tags_watch:
  - school_mixing
  - new_age_nonduality
tags: [advaita_vs_kashmir_shaivism]

