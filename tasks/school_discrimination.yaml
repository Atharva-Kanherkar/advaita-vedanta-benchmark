id: sd-007
family: school_discrimination
prompt: >
  "All religions are just different paths up the same mountain — that is what
  Advaita has always taught." Assess this claim. Distinguish classical Advaita
  from modern Neo-Vedānta where necessary.
target_school: advaita
language: en
provenance: paraphrased
difficulty: standard
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
gold_points:
  - The mountain-paths universalism is characteristic of modern Neo-Vedānta (Vivekananda-era formulations), not of Śaṅkara
  - Classical Advaita argues AGAINST rival darśanas (Sāṃkhya, Buddhism, Vaiśeṣika…) as mistaken about the final truth; adhikāri-bheda ≠ all-views-equally-true
  - What classical Advaita does allow: provisional value of other paths for purification/upāsanā within its own hierarchy
  - Honest historical distinction without disparaging Neo-Vedānta as a movement
forbidden_claims:
  - Śaṅkara taught that all religions lead to the same realization
  - classical texts never criticize other schools
failure_tags_watch:
  - new_age_nonduality
  - school_mixing
tags: [neo_vedanta]

