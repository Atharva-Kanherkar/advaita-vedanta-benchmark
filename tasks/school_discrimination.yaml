id: sd-010
family: school_discrimination
prompt: >
  Gauḍapāda teaches ajātivāda — nothing is ever really born — and Nāgārjuna's
  Madhyamaka also denies origination. Advaita's critics from Bhāskara onward
  called Advaitins "crypto-Buddhists" (pracchanna-bauddha). Is the charge
  correct? Argue it properly, conceding what should be conceded.
target_school: advaita
contrast_school: madhyamaka
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
reference_answer: >
  Concede what is real: Gauḍapāda knew and used Buddhist dialectic — kārikā
  book 4 employs Madhyamaka-style arguments, the non-origination conclusion is
  formally parallel, and the historical influence question is legitimate. Then
  locate the divide: for Madhyamaka, the denial of origination follows from
  niḥsvabhāvatā — no intrinsic nature anywhere, dependent origination all the
  way down, with no substratum affirmed; for Gauḍapāda and Advaita, nothing is
  born BECAUSE the unborn, changeless, self-luminous ātman/Brahman alone is —
  a permanent substratum Buddhism explicitly rejects (anātman). Śūnyatā is not
  Brahman: one is the emptiness of intrinsic nature, the other the plenum of
  intrinsic being (sat, cit). Gauḍapāda himself marks the difference
  (naitad buddhena bhāṣitam, GK 4.99 — "this was not spoken by the Buddha").
  Verdict: methodological borrowing, doctrinal opposition — the charge
  confuses shared dialectic with shared ontology.
gold_points:
  - Concede historical/dialectical proximity (GK book 4) honestly
  - ajātivāda from a substratum (unborn ātman) vs from niḥsvabhāvatā (no substratum)
  - śūnyatā ≠ Brahman; anātman vs ātman is the non-negotiable divide
  - GK 4.99 or equivalent internal evidence; verdict: borrowed method, opposed ontology
forbidden_claims:
  - Advaita is simply Buddhism disguised
  - there is no historical or dialectical connection at all to concede
failure_tags_watch:
  - school_mixing
tags: [prachanna_bauddha, ajativada]
