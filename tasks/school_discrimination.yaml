id: sd-008
family: school_discrimination
prompt: >
  Identify the school behind each unattributed position and justify from the
  wording alone. (1) "The self and the Lord are eternally distinct; the self is
  a mode qualifying the Lord as a body qualifies a soul." (2) "No entity
  whatsoever possesses intrinsic nature; even emptiness is empty." (3) "There
  is only consciousness; an external object is never proven, as in a dream."
  (4) "The self is never bound and never liberated; the appearance of both is
  due to superimposition on the changeless witness."
target_school: advaita
language: en
provenance: novel
difficulty: hard
rubric_dimensions:
  - advaita_position
  - contrast_accuracy
  - no_ecumenism
  - attribution_hygiene
gold_points:
  - (1) Viśiṣṭādvaita — śarīra-śarīri (body-soul) qualification language
  - (2) Madhyamaka — niḥsvabhāvatā and śūnyatā-of-śūnyatā
  - (3) Yogācāra/Vijñānavāda — denial of external object, dream analogy for cognition-only
  - (4) Advaita — changeless witness + superimposition; bondage/liberation as adhyāsa
  - Justifications must cite the diagnostic phrases, not vibes; (3) vs (4) discrimination is the hard pair (consciousness-only vs witness-substratum)
forbidden_claims:
  - statement 3 is Advaita
  - statement 2 and statement 4 assert the same position
failure_tags_watch:
  - school_mixing
tags: [identify_school]

